<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Enrollment System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    .form-group {
      margin: 10px 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 250px;
      padding: 6px;
    }
    button {
      padding: 8px 16px;
      margin-top: 10px;
      background-color: #007cba;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #005a87;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .output {
      margin-top: 20px;
      font-family: monospace;
      white-space: pre;
      background-color: #f0f8ff;
      padding: 15px;
      border-left: 4px solid #007cba;
      border-radius: 5px;
    }
    .success { color: #28a745; font-weight: bold; }
    .error { color: #dc3545; font-weight: bold; }
    .seats-info { color: #007cba; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Exercise 3 – Course Enrollment System (Interactive)</h2>

  <div class="form-group">
    <label>Course Name:</label>
    <input type="text" id="courseName" value="Web Technologies" />
  </div>

  <div class="form-group">
    <label>Instructor:</label>
    <input type="text" id="instructor" value="Dr. Kumar" />
  </div>

  <div class="form-group">
    <label>Total Seats:</label>
    <input type="number" id="totalSeats" value="5" min="1" max="50" />
  </div>

  <div class="form-group">
    <label>Currently Enrolled:</label>
    <input type="number" id="currentEnrolled" value="0" min="0" readonly />
  </div>

  <button id="enrollBtn" onclick="enroll()">Enroll Student</button>

  <div id="output" class="output"></div>

  <script>
    // Global course instance to track state
    let currentCourse = null;
    const MAX_ENROLLED = 50; // Safety limit

    // ES6 class for Course with seat tracking
    class Course {
      constructor(courseName, instructor, totalSeats) {
        this.courseName = courseName;
        this.instructor = instructor;
        this.totalSeats = parseInt(totalSeats) || 5;
        this.enrolledSeats = 0;
      }

      displayCourse() {
        return `Course: ${this.courseName}, Instructor: ${this.instructor}`;
      }

      seatsAvailable() {
        return this.enrolledSeats < this.totalSeats;
      }

      enrollStudent() {
        return new Promise((resolve, reject) => {
          // Simulate API delay for seat check
          setTimeout(() => {
            if (this.seatsAvailable()) {
              this.enrolledSeats++;
              resolve("✅ Enrollment Successful");
            } else {
              reject("❌ Course Full - No seats available!");
            }
          }, 800); // 0.8 second delay
        });
      }

      getRemainingSeats() {
        return this.totalSeats - this.enrolledSeats;
      }
    }

    // Initialize course with default values
    function initCourse() {
      const courseName = document.getElementById("courseName").value || "Unknown Course";
      const instructor = document.getElementById("instructor").value || "Unknown Instructor";
      const totalSeats = document.getElementById("totalSeats").value || 5;
      
      currentCourse = new Course(courseName, instructor, totalSeats);
      updateUI();
    }

    // Update UI with current course info
    function updateUI() {
      if (currentCourse) {
        document.getElementById("currentEnrolled").value = currentCourse.enrolledSeats;
        const enrollBtn = document.getElementById("enrollBtn");
        
        if (!currentCourse.seatsAvailable()) {
          enrollBtn.disabled = true;
          enrollBtn.textContent = "Course Full";
        } else {
          enrollBtn.disabled = false;
          enrollBtn.textContent = "Enroll Student";
        }
      }
    }

    // Enrollment function
    function enroll() {
      const output = document.getElementById("output");
      output.innerHTML = "⏳ Checking seat availability...";

      currentCourse.enrollStudent()
        .then(msg => {
          output.innerHTML = `
${currentCourse.displayCourse()}
${msg}

📊 Seats Status: ${currentCourse.enrolledSeats}/${currentCourse.totalSeats} 
🪑 Remaining: ${currentCourse.getRemainingSeats()}
          `;
          output.className = "output success";
          updateUI(); // Update enrolled count and button
        })
        .catch(err => {
          output.innerHTML = `
${currentCourse.displayCourse()}
${err}

📊 Seats Status: ${currentCourse.enrolledSeats}/${currentCourse.totalSeats} (Full!)
          `;
          output.className = "output error";
          updateUI();
        });
    }

    // Initialize on page load
    window.onload = function() {
      initCourse();
      
      // Listen for course changes
      document.getElementById("courseName").addEventListener("input", initCourse);
      document.getElementById("instructor").addEventListener("input", initCourse);
      document.getElementById("totalSeats").addEventListener("input", initCourse);
    };
  </script>
</body>
</html>
