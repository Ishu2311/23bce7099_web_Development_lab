<!DOCTYPE html>
<html>
<head>
<title>Online Book Finder</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#4facfe,#00f2fe);
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#333;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

input,select,button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4facfe;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0077ff;
}

.books{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.book{
background:#f7f7f7;
padding:15px;
border-radius:8px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.book h3{
margin:0;
color:#333;
}

.book p{
margin:5px 0;
font-size:14px;
}

.load-btn{
margin-top:20px;
display:block;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<div class="container">

<h1>📚 Online Book Finder</h1>

<div class="controls">

<input type="text" id="searchTitle" placeholder="Search by Title">

<button onclick="searchBooks()">Search</button>

<select id="category">
<option value="">Filter Category</option>
<option value="Programming">Programming</option>
<option value="Database">Database</option>
<option value="AI">AI</option>
</select>

<button onclick="filterCategory()">Filter</button>

<button onclick="sortPrice()">Sort by Price</button>

<button onclick="sortRating()">Sort by Rating</button>

<button onclick="topBooks()">Top Rated</button>

</div>

<div class="books" id="books"></div>

<button class="load-btn" onclick="loadMore()">Load More</button>

</div>

<script>

const API="http://localhost:3000/books"
let page=1

function displayBooks(data){

let html=""

data.forEach(book=>{

html+=`
<div class="book">
<h3>${book.title}</h3>
<p><b>Author:</b> ${book.author}</p>
<p><b>Category:</b> ${book.category}</p>
<p><b>Price:</b> ₹${book.price}</p>
<p><b>Rating:</b> ⭐ ${book.rating}</p>
<p><b>Year:</b> ${book.year}</p>
</div>
`

})

if(page===1)
document.getElementById("books").innerHTML=html
else
document.getElementById("books").innerHTML+=html

}

function searchBooks(){

let title=document.getElementById("searchTitle").value

fetch(API+"/search?title="+title)
.then(res=>res.json())
.then(data=>{
page=1
displayBooks(data)
})

}

function filterCategory(){

let cat=document.getElementById("category").value

fetch(API+"/category/"+cat)
.then(res=>res.json())
.then(data=>{
page=1
displayBooks(data)
})

}

function sortPrice(){

fetch(API+"/sort/price")
.then(res=>res.json())
.then(data=>{
page=1
displayBooks(data)
})

}

function sortRating(){

fetch(API+"/sort/rating")
.then(res=>res.json())
.then(data=>{
page=1
displayBooks(data)
})

}

function topBooks(){

fetch(API+"/top")
.then(res=>res.json())
.then(data=>{
page=1
displayBooks(data)
})

}

function loadMore(){

page++

fetch(API+"?page="+page)
.then(res=>res.json())
.then(data=>{
displayBooks(data)
})

}

loadMore()

</script>

</body>
</html>
